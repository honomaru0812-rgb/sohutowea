
[functions.ai-assist]
enabled = true
verify_jwt = false
import_map = "./functions/ai-assist/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/ai-assist/index.ts"
